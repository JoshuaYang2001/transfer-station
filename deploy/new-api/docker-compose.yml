services:
  new-api:
    image: calciumion/new-api:latest
    container_name: haps-new-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./data:/data
    environment:
      TZ: Asia/Shanghai
      SESSION_SECRET: ${NEW_API_SESSION_SECRET:?NEW_API_SESSION_SECRET is required}
      CRYPTO_SECRET: ${NEW_API_CRYPTO_SECRET:?NEW_API_CRYPTO_SECRET is required}
      ERROR_LOG_ENABLED: "true"
      BATCH_UPDATE_ENABLED: "true"
      STREAMING_TIMEOUT: "300"
      RELAY_IDLE_CONN_TIMEOUT: "90"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O - http://127.0.0.1:3000/api/status | grep -q '"success":true'
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s
